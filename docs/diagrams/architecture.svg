<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440" font-family="'Geist', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <rect width="820" height="440" fill="#ffffff"/>

  <!-- Title -->
  <text x="410" y="35" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a2e">ClaimPilot Architecture</text>

  <!-- Legend -->
  <rect x="30" y="415" width="14" height="14" rx="2" fill="#d0ebff" stroke="#1971c2"/>
  <text x="50" y="427" font-size="11" fill="#444">UI</text>
  <rect x="90" y="415" width="14" height="14" rx="2" fill="#d8f5a2" stroke="#2f9e44"/>
  <text x="110" y="427" font-size="11" fill="#444">API</text>
  <rect x="150" y="415" width="14" height="14" rx="2" fill="#fff3bf" stroke="#e67700"/>
  <text x="170" y="427" font-size="11" fill="#444">External</text>
  <rect x="240" y="415" width="14" height="14" rx="2" fill="#dee2e6" stroke="#495057"/>
  <text x="260" y="427" font-size="11" fill="#444">Data</text>

  <!-- Frontend group -->
  <rect x="30" y="60" width="250" height="220" rx="12" fill="#d0ebff" fill-opacity="0.3" stroke="#1971c2" stroke-width="2"/>
  <text x="45" y="82" font-size="13" font-weight="700" fill="#1971c2">Frontend (Next.js 16)</text>

  <rect x="50" y="95" width="100" height="40" rx="6" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="100" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#1971c2">Intake Form</text>

  <rect x="165" y="95" width="100" height="40" rx="6" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="215" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#1971c2">Agent Chat</text>

  <rect x="50" y="150" width="215" height="40" rx="6" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="157" y="175" text-anchor="middle" font-size="11" font-weight="600" fill="#1971c2">Analytics Dashboard</text>

  <rect x="50" y="205" width="215" height="35" rx="6" fill="#74c0fc" fill-opacity="0.4" stroke="#1971c2" stroke-width="1"/>
  <text x="157" y="227" text-anchor="middle" font-size="10" fill="#1971c2">PostHog Provider (client events)</text>

  <rect x="50" y="248" width="215" height="22" rx="4" fill="#edf2ff" stroke="#1971c2" stroke-width="0.5"/>
  <text x="157" y="263" text-anchor="middle" font-size="9" fill="#4a7ab5">Tailwind 4 + shadcn/ui + Geist</text>

  <!-- API group -->
  <rect x="320" y="60" width="210" height="220" rx="12" fill="#d8f5a2" fill-opacity="0.3" stroke="#2f9e44" stroke-width="2"/>
  <text x="335" y="82" font-size="13" font-weight="700" fill="#2f9e44">API Layer</text>

  <rect x="340" y="95" width="170" height="45" rx="6" fill="#b2f2bb" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="425" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#2f9e44">/api/chat</text>
  <text x="425" y="130" text-anchor="middle" font-size="9" fill="#3a7a20">streamText + Vercel AI SDK</text>

  <rect x="340" y="155" width="170" height="105" rx="6" fill="#b2f2bb" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="425" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#2f9e44">Tool Registry</text>
  <text x="355" y="195" font-size="10" fill="#3a7a20" font-family="'Geist Mono', monospace">classifyClaim</text>
  <text x="355" y="210" font-size="10" fill="#3a7a20" font-family="'Geist Mono', monospace">lookupPolicy</text>
  <text x="355" y="225" font-size="10" fill="#3a7a20" font-family="'Geist Mono', monospace">assessFraud</text>
  <text x="355" y="240" font-size="10" fill="#3a7a20" font-family="'Geist Mono', monospace">estimateResolution</text>

  <!-- External group -->
  <rect x="570" y="60" width="220" height="220" rx="12" fill="#fff3bf" fill-opacity="0.3" stroke="#e67700" stroke-width="2"/>
  <text x="585" y="82" font-size="13" font-weight="700" fill="#e67700">External Services</text>

  <rect x="590" y="95" width="180" height="50" rx="6" fill="#ffec99" stroke="#e67700" stroke-width="1.5"/>
  <text x="680" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#e67700">Claude API</text>
  <text x="680" y="135" text-anchor="middle" font-size="10" fill="#b36b00">Anthropic (tool-use)</text>

  <rect x="590" y="160" width="180" height="40" rx="6" fill="#ffec99" stroke="#e67700" stroke-width="1.5"/>
  <text x="680" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#e67700">PostHog Analytics</text>

  <rect x="590" y="215" width="180" height="40" rx="6" fill="#ffec99" stroke="#e67700" stroke-width="1.5"/>
  <text x="680" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#e67700">GitHub Actions CI</text>

  <!-- Data group -->
  <rect x="320" y="310" width="210" height="80" rx="12" fill="#dee2e6" fill-opacity="0.3" stroke="#495057" stroke-width="2"/>
  <text x="335" y="332" font-size="13" font-weight="700" fill="#495057">Data Layer</text>

  <rect x="340" y="345" width="170" height="30" rx="6" fill="#e9ecef" stroke="#495057" stroke-width="1.5"/>
  <text x="425" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#495057" font-family="'Geist Mono', monospace">SQLite (better-sqlite3)</text>

  <!-- Arrows -->
  <!-- Frontend to API -->
  <line x1="280" y1="115" x2="340" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- API to Claude -->
  <line x1="510" y1="115" x2="590" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- API to SQLite -->
  <line x1="425" y1="260" x2="425" y2="310" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Frontend to PostHog -->
  <line x1="265" y1="222" x2="590" y2="180" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrLight)"/>
  <!-- Dashboard to SQLite -->
  <line x1="157" y1="190" x2="340" y2="350" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrLight)"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="arrLight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd"/>
    </marker>
  </defs>
</svg>
